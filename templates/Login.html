<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ML Personality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='dark-mode.css') }}">

    <script src="{{ url_for('static', filename='Theme.js') }}"></script>
    
    <style>
        body { background: linear-gradient(to bottom, #f8fafc, #f1f5f9); transition: all 0.3s ease; }
        .dark-mode body, .dark-mode { background: #0f172a !important; }
        
        /* Dark mode dikelola oleh Theme.js */
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-6 md:mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl shadow-lg mb-4">
            <i class="fas fa-chart-bar text-white text-2xl md:text-3xl"></i>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900">ML Personality</h1>
        <p class="text-gray-500 text-xs md:text-sm mt-1">Analisis Kepribadian dengan Machine Learning</p>
    </div>

    <div class="bg-white w-full max-w-md p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800">Login</h2>
        <p class="text-gray-400 text-sm mb-6">Masukkan kredensial Anda untuk melanjutkan</p>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required placeholder="Masukkan Username Anda" 
                       class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" required placeholder="Masukkan Password Anda" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="far fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all active:scale-[0.98]">
                Login
            </button>
        </form>

        <div class="mt-6 p-4 bg-blue-50 rounded-lg dark:bg-slate-800">
            <p class="text-center text-blue-600 dark:text-blue-400 text-xs font-medium">
                Demo: admin / 12345 atau 2244002 / winston
            </p>
        </div>
    </div>

    <footer class="mt-6 md:mt-12 text-gray-400 text-xs md:text-sm">© 2026 ML Personality. All rights reserved.</footer>

    <script>
        // Memastikan tema diterapkan saat halaman dimuat
        window.onload = function() {
            if (typeof applyTheme === "function") {
                applyTheme();
            }
        };

        // Fitur Lihat Password
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        // Logika Pengiriman Form via Fetch ke Flask
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Animasi Loading
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            // Mengirim data ke route /login di App.py
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = "/"; // Redirect ke kuesioner jika sukses
                } else {
                    return response.json().then(err => { throw new Error(err.message); });
                }
            })
            .catch(error => {
                alert(error.message || "Login Gagal! Username tidak terdaftar.");
                btn.innerHTML = 'Login';
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            });
        });
    </script>
</body>
</html>
